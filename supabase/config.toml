# =============================================================================
# AGUACLAUDE2026 — Supabase CLI config
# Generado por Claude el 2026-05-01.
# Solo se usa para desarrollo LOCAL (supabase start). Producción se gestiona
# por dashboard. NO incluye secretos.
# =============================================================================

project_id = "AGUACLAUDE2026"

[api]
enabled = true
port = 54321
schemas = ["public", "app", "graphql_public"]
extra_search_path = ["public", "extensions", "app"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false   # Solo el superadmin/admin crea usuarios. NUNCA self-signup.
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 12

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true

# Custom Access Token Hook — añade claims al JWT (company_id, roles, departments).
# Implementado en migración 20260501120400_auth_hook.sql como
# public.custom_access_token_hook(event jsonb) returns jsonb.
[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"

[edge_runtime]
enabled = true
policy = "oneshot"

[analytics]
enabled = false
